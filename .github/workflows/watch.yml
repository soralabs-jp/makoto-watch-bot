name: Watch Makoto

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run watcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USERNAME: まことちゃん通知
          PROFILE_URL: ${{ vars.PROFILE_URL || 'https://m-surprise.com/profile/?id=4967' }}
          DIARY_URL: ${{ vars.DIARY_URL || 'https://diary.m-surprise.com/category/no-75-%e3%81%be%e3%81%93%e3%81%a8/' }}
          TIMEZONE: Asia/Tokyo
          FETCH_TIMEOUT_MS: 45000
          DIARY_PAGE_LIMIT: ${{ vars.DIARY_PAGE_LIMIT || '3' }}
          NOTIFY_INITIAL_SNAPSHOT: ${{ vars.NOTIFY_INITIAL_SNAPSHOT || 'false' }}
          NOTIFY_SCHEDULE: ${{ vars.NOTIFY_SCHEDULE || 'true' }}
          NOTIFY_PROFILE: ${{ vars.NOTIFY_PROFILE || 'true' }}
          NOTIFY_PHOTOS: ${{ vars.NOTIFY_PHOTOS || 'true' }}
          NOTIFY_DIARY: ${{ vars.NOTIFY_DIARY || 'true' }}
        run: npm start

      - name: Commit updated snapshots
        run: |
          if ! git diff --quiet -- data/latest.json data/previous.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/latest.json data/previous.json
            git commit -m "chore: update makoto snapshots"
            git push
          fi
