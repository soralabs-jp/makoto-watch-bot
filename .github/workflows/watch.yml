name: Watch Makoto

on:
  workflow_dispatch:
    inputs:
      test_notification:
        description: "Send a test notification only"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run watcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USERNAME: まことちゃん通知
          PROFILE_URL: ${{ vars.PROFILE_URL || 'https://m-surprise.com/profile/?id=4967' }}
          RANKING_URL: ${{ vars.RANKING_URL || 'https://m-surprise.com/ranking/' }}
          DIARY_URL: ${{ vars.DIARY_URL || 'https://diary.m-surprise.com/category/no-75-%e3%81%be%e3%81%93%e3%81%a8/' }}
          RANKING_TARGET_CAST_NO: ${{ vars.RANKING_TARGET_CAST_NO || '75' }}
          TIMEZONE: Asia/Tokyo
          FETCH_TIMEOUT_MS: 60000
          FETCH_RETRY_COUNT: 3
          DIARY_PAGE_LIMIT: ${{ vars.DIARY_PAGE_LIMIT || '3' }}
          NOTIFY_INITIAL_SNAPSHOT: ${{ vars.NOTIFY_INITIAL_SNAPSHOT || 'false' }}
          NOTIFY_SCHEDULE: ${{ vars.NOTIFY_SCHEDULE || 'true' }}
          NOTIFY_PROFILE: ${{ vars.NOTIFY_PROFILE || 'true' }}
          NOTIFY_PHOTOS: ${{ vars.NOTIFY_PHOTOS || 'true' }}
          NOTIFY_DIARY: ${{ vars.NOTIFY_DIARY || 'true' }}
          NOTIFY_RANKING: ${{ vars.NOTIFY_RANKING || 'true' }}
          TEST_NOTIFICATION: ${{ github.event.inputs.test_notification || 'false' }}
        run: npm start

      - name: Export life-log payload
        if: ${{ github.event.inputs.test_notification != 'true' }}
        run: npm run export:life-log

      - name: Commit updated snapshots
        if: ${{ github.event.inputs.test_notification != 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if ! git diff --quiet -- data/latest.json data/previous.json data/ranking-state.json data/life-log-import.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git add data/latest.json data/previous.json data/ranking-state.json data/life-log-import.json
            git commit -m "chore: update makoto snapshots"
            resolve_snapshot_rebase() {
              if [ ! -d .git/rebase-merge ] && [ ! -d .git/rebase-apply ]; then
                return 1
              fi
              git checkout --theirs -- data/latest.json data/previous.json data/ranking-state.json data/life-log-import.json
              git add data/latest.json data/previous.json data/ranking-state.json data/life-log-import.json
              GIT_EDITOR=true git rebase --continue
            }
            if ! git pull --rebase origin main; then
              resolve_snapshot_rebase
            fi
            for attempt in 1 2 3; do
              if git push origin HEAD:main; then
                exit 0
              fi
              if [ "$attempt" -eq 3 ]; then
                exit 1
              fi
              sleep 5
              if ! git pull --rebase origin main; then
                resolve_snapshot_rebase
              fi
            done
          fi

